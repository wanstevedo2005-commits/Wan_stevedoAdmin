<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corporate Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        .tab-content { display: none; animation: fadeIn 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #2563eb !important; }
    </style>
</head>
<body class="text-slate-800 font-sans pb-20">

    <div class="max-w-md mx-auto min-h-screen relative shadow-lg bg-slate-50">

        <header class="bg-white px-6 py-5 flex justify-between items-center sticky top-0 z-20 shadow-sm border-b border-slate-100">
            <div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">Admin Console</h1>
                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">ระบบบริหารจัดการพนักงาน</p>
            </div>
            <div class="h-10 w-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </header>

        <main class="p-4">
            <div id="tab-daily" class="tab-content active">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-extrabold">บันทึกเวลาวันนี้</h2>
                    <div class="relative">
                        <input type="date" id="dateFilter" class="bg-white border-0 shadow-sm text-sm rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-slate-600 font-bold">
                    </div>
                </div>
                <div id="dailyContainer" class="space-y-3">
                    <p class="text-center text-slate-400 text-xs py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลดข้อมูล...</p>
                </div>
            </div>

            <div id="tab-stats" class="tab-content">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-extrabold text-slate-800 text-center">สถิติการมาสาย</h2>
                </div>
                <div id="statsContainer" class="space-y-4">
                    <p class="text-center text-slate-400 text-xs py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลดข้อมูล...</p>
                </div>
            </div>

            <div id="tab-users" class="tab-content">
                <h2 class="text-lg font-extrabold text-slate-800 mb-5">ทะเบียนพนักงาน</h2>
                <div id="usersContainer" class="grid grid-cols-2 gap-4">
                    <p class="text-center text-slate-400 text-xs py-10 col-span-2"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around items-center pt-3 px-2 z-30 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)]" style="padding-bottom: env(safe-area-inset-bottom);">
            <button onclick="switchTab('daily')" id="nav-daily" class="nav-btn w-1/3 py-2 flex flex-col items-center nav-active transition-all">
                <i class="fa-solid fa-calendar-check text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">Daily</span>
            </button>
            <button onclick="switchTab('stats')" id="nav-stats" class="nav-btn w-1/3 py-2 flex flex-col items-center text-slate-300 transition-all">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">History</span>
            </button>
            <button onclick="switchTab('users')" id="nav-users" class="nav-btn w-1/3 py-2 flex flex-col items-center text-slate-300 transition-all">
                <i class="fa-solid fa-id-card-clip text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">Staff</span>
            </button>
        </nav>

        <div id="profileModal" class="fixed inset-0 bg-white z-40 flex flex-col transform translate-y-full transition-transform duration-300 ease-out">
            <div class="bg-slate-50 px-6 py-6 flex items-center justify-between border-b border-slate-100 pt-safe" style="padding-top: env(safe-area-inset-top);">
                <button onclick="closeProfile()" class="h-10 w-10 flex items-center justify-center rounded-xl bg-white shadow-sm text-slate-800">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <span class="font-black text-slate-900">Personnel Record</span>
                <div class="w-10"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-6">
                <div class="text-center mb-8">
                    <div class="h-24 w-24 mx-auto rounded-3xl bg-slate-100 text-slate-800 flex justify-center items-center font-black text-4xl mb-4 shadow-sm" id="modalIcon">?</div>
                    <h3 class="font-black text-2xl text-slate-900" id="modalName">-</h3>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-indigo-600 rounded-3xl p-5 text-center text-white shadow-blue-200 shadow-lg">
                        <p class="text-[10px] opacity-70 mb-1 font-bold">WORK DAYS</p>
                        <p class="text-3xl font-black" id="modalDays">0</p>
                    </div>
                    <div class="bg-white rounded-3xl p-5 text-center border border-slate-100 shadow-sm">
                        <p class="text-[10px] text-rose-500 mb-1 font-bold uppercase">Lateness</p>
                        <p class="text-3xl font-black text-rose-600" id="modalLate">0</p>
                    </div>
                </div>

                <h4 class="font-black text-slate-800 mb-4 text-xs uppercase tracking-widest">Attendance Logs</h4>
                <div class="space-y-3" id="modalLogs">
                    </div>
            </div>
        </div>

        <div id="imageViewerModal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col items-center justify-center transition-opacity" style="padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);">
            <button onclick="closeImageViewer()" class="absolute top-6 right-6 bg-white/20 text-white rounded-full h-10 w-10 flex items-center justify-center hover:bg-white/40 backdrop-blur-md z-50">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            
            <div class="w-full h-full flex items-center justify-center p-4">
                <img id="viewerImage" src="" alt="Evidence" class="max-w-full max-h-full rounded-xl object-contain shadow-2xl">
            </div>
        </div>

    </div>

    <script>
        // ลิงก์ API
        const API_URL = "https://script.google.com/macros/s/AKfycbwSBHeswptojhNiHKeIsgo3cwaTEjOfBqPhJnY8GmGw_abhfPMk87FEA5dGm1j27gLm3A/exec";
        let allData = [];

        document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                
                allData = rawData.map(item => {
                    const keys = Object.keys(item);
                    return {
                        time: item[keys[0]] || "", 
                        name: item[keys[2]] || "ไม่ระบุ", 
                        image: item[keys[3]] || "" 
                    };
                });
                
                renderDaily();
                renderStats();
                renderEmployeeList();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('dailyContainer').innerHTML = '<p class="text-center text-rose-500 text-xs py-10">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>';
                document.getElementById('statsContainer').innerHTML = '<p class="text-center text-rose-500 text-xs py-10">เกิดข้อผิดพลาด</p>';
                document.getElementById('usersContainer').innerHTML = '<p class="text-center text-rose-500 text-xs py-10 col-span-2">เกิดข้อผิดพลาด</p>';
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('nav-active');
                el.classList.add('text-slate-300');
            });
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('nav-active');
            document.getElementById('nav-' + tabId).classList.remove('text-slate-300');
        }

        function renderDaily() {
            const selectedDate = document.getElementById('dateFilter').value;
            const dailyData = allData.filter(item => item.time.startsWith(selectedDate));
            
            const container = document.getElementById('dailyContainer');
            if (dailyData.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 text-xs py-10">ไม่มีบันทึกการเข้างานในวันนี้</p>';
                return;
            }

            container.innerHTML = dailyData.map(item => {
                const timeOnly = item.time.split(' ')[1] || item.time;
                const isLate = timeOnly > "08:40:00"; 

                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="h-12 w-12 rounded-2xl ${isLate ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'} flex justify-center items-center font-bold text-xl shadow-sm">${item.name.charAt(0)}</div>
                            <div>
                                <h3 class="font-bold text-slate-800">คุณ${item.name}</h3>
                                <p class="text-[11px] ${isLate ? 'text-rose-400 font-bold' : 'text-slate-400 font-medium'}">เข้างาน: ${timeOnly}</p>
                            </div>
                        </div>
                        <span class="${isLate ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'} px-3 py-1 rounded-lg text-[10px] font-black uppercase border">
                            ${isLate ? 'Late' : 'On Time'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function renderStats() {
            const empNames = [...new Set(allData.map(item => item.name).filter(n => n))];
            const container = document.getElementById('statsContainer');
            let html = '';
            
            empNames.forEach(name => {
                const empLogs = allData.filter(item => item.name === name);
                const lateLogs = empLogs.filter(item => {
                    const timeOnly = item.time.split(' ')[1] || "";
                    return timeOnly > "08:40:00";
                });
                
                if (lateLogs.length > 0) {
                    const lateDates = lateLogs.map(item => {
                        const d = item.time.split(' ')[0]; 
                        return `<span class="bg-slate-50 text-slate-600 text-[10px] px-2 py-1 rounded-md border border-slate-100 font-medium shadow-sm">${d}</span>`;
                    }).join('');

                    html += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center space-x-3">
                                    <div class="h-10 w-10 rounded-xl bg-slate-100 flex items-center justify-center font-bold text-slate-600">${name.charAt(0)}</div>
                                    <h3 class="font-bold text-slate-800">คุณ${name}</h3>
                                </div>
                                <div class="text-right text-rose-600 font-black text-xl">${lateLogs.length} <span class="text-[10px] text-slate-400 font-medium">ครั้ง/เดือน</span></div>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">วันที่มาสาย:</p>
                                <div class="flex flex-wrap gap-2">${lateDates}</div>
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html || '<div class="bg-emerald-50 p-6 rounded-3xl text-center border border-emerald-100"><i class="fa-solid fa-trophy text-emerald-500 text-3xl mb-3"></i><p class="text-emerald-700 font-bold text-sm">ยอดเยี่ยม! เดือนนี้ยังไม่มีพนักงานมาสาย</p></div>';
        }

        function renderEmployeeList() {
            const empNames = [...new Set(allData.map(item => item.name).filter(n => n))];
            const container = document.getElementById('usersContainer');
            
            container.innerHTML = empNames.map(name => {
                const empLogs = allData.filter(item => item.name === name);
                const lateCount = empLogs.filter(item => (item.time.split(' ')[1] || "") > "08:40:00").length;

                return `
                    <div onclick="openProfile('${name}')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center active:scale-95 transition-transform cursor-pointer">
                        <div class="h-16 w-16 mx-auto rounded-2xl ${lateCount > 3 ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'} flex justify-center items-center font-bold text-2xl mb-3 shadow-sm">${name.charAt(0)}</div>
                        <p class="font-bold text-slate-800">คุณ${name}</p>
                        <p class="text-[10px] ${lateCount > 0 ? 'text-rose-400 font-bold' : 'text-slate-400'}">${lateCount > 0 ? 'สาย '+lateCount+' ครั้ง' : 'ไม่เคยสาย'}</p>
                    </div>
                `;
            }).join('');
        }

        function openProfile(name) {
            const empLogs = allData.filter(item => item.name === name);
            const lateLogs = empLogs.filter(item => (item.time.split(' ')[1] || "") > "08:40:00");

            document.getElementById('modalName').innerText = "คุณ" + name;
            document.getElementById('modalIcon').innerText = name.charAt(0);
            document.getElementById('modalDays').innerText = empLogs.length;
            document.getElementById('modalLate').innerText = lateLogs.length;

            const logsHtml = empLogs.slice(0, 10).map(item => {
                const dateObj = item.time.split(' ')[0];
                const timeOnly = item.time.split(' ')[1] || item.time;
                const isLate = timeOnly > "08:40:00";
                
                // แก้ไข: เปลี่ยนจาก <a> เป็น <button> เพื่อกดแล้วเปิดรูปในแอป
                return `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div>
                            <span class="text-xs font-bold text-slate-600 block">${dateObj}</span>
                            ${item.image && item.image.includes('http') ? `<button onclick="openImageViewer('${item.image}')" class="text-[10px] text-blue-600 font-bold uppercase tracking-tight mt-1 inline-block hover:underline text-left"><i class="fa-solid fa-image mr-1"></i>ดูรูปหลักฐาน</button>` : ''}
                        </div>
                        <span class="text-xs font-black ${isLate ? 'text-rose-600' : 'text-slate-900'}">${timeOnly}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('modalLogs').innerHTML = logsHtml || '<p class="text-center text-xs text-slate-400 py-4">ไม่มีประวัติการลงเวลา</p>';
            document.getElementById('profileModal').classList.remove('translate-y-full');
        }

        function closeProfile() {
            document.getElementById('profileModal').classList.add('translate-y-full');
        }

        // ฟังก์ชันใหม่: แปลงลิงก์ Google Drive แล้วเปิดรูปซ้อนทับในแอป
        function openImageViewer(driveUrl) {
            let directImageUrl = driveUrl;
            
            // ใช้ Regex ดึง File ID ออกมาจากลิงก์ Google Drive เพื่อแปลงเป็นลิงก์รูปภาพโดยตรง
            const match = driveUrl.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
                directImageUrl = `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }

            // ใส่รูปลงไป
            document.getElementById('viewerImage').src = directImageUrl;
            
            // แสดงหน้าต่าง Pop-up
            const viewerModal = document.getElementById('imageViewerModal');
            viewerModal.classList.remove('hidden');
            viewerModal.classList.add('flex');
        }

        // ฟังก์ชันใหม่: ปิดหน้าต่างดูรูป
        function closeImageViewer() {
            const viewerModal = document.getElementById('imageViewerModal');
            viewerModal.classList.add('hidden');
            viewerModal.classList.remove('flex');
            document.getElementById('viewerImage').src = ""; // ล้างรูปออกเพื่อไม่ให้ค้างตอนเปิดคนอื่น
        }

        document.getElementById('dateFilter').addEventListener('change', renderDaily);

        fetchData();
    </script>
</body>
</html>
