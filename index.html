<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corporate Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        .tab-content { display: none; animation: fadeIn 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #2563eb !important; }
    </style>
</head>
<body class="text-slate-800 font-sans pb-20">

    <div class="max-w-md mx-auto min-h-screen relative shadow-lg bg-slate-50">

        <header class="bg-white px-6 py-5 flex justify-between items-center sticky top-0 z-20 shadow-sm border-b border-slate-100">
            <div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">Admin Console</h1>
                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">ระบบบริหารจัดการพนักงาน</p>
            </div>
            <div class="h-10 w-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </header>

        <main class="p-4">
            <div id="tab-daily" class="tab-content active">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-extrabold">บันทึกเวลาวันนี้</h2>
                    <div class="relative">
                        <input type="date" id="dateFilter" class="bg-white border-0 shadow-sm text-sm rounded-xl px-4 py-2 outline-none text-slate-600 font-bold">
                    </div>
                </div>
                <div id="dailyContainer" class="space-y-3">
                    <p class="text-center text-slate-400 text-xs py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลดข้อมูล...</p>
                </div>
            </div>

            <div id="tab-stats" class="tab-content">
                <h2 class="text-lg font-extrabold text-slate-800 text-center mb-5">สถิติการมาสาย</h2>
                <div id="statsContainer" class="space-y-4"></div>
            </div>

            <div id="tab-users" class="tab-content">
                <h2 class="text-lg font-extrabold text-slate-800 mb-5">ทะเบียนพนักงาน</h2>
                <div id="usersContainer" class="grid grid-cols-2 gap-4"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around items-center pt-3 px-2 z-30 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)]" style="padding-bottom: env(safe-area-inset-bottom);">
            <button onclick="switchTab('daily')" id="nav-daily" class="nav-btn w-1/3 py-2 flex flex-col items-center nav-active transition-all">
                <i class="fa-solid fa-calendar-check text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">Daily</span>
            </button>
            <button onclick="switchTab('stats')" id="nav-stats" class="nav-btn w-1/3 py-2 flex flex-col items-center text-slate-300 transition-all">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">History</span>
            </button>
            <button onclick="switchTab('users')" id="nav-users" class="nav-btn w-1/3 py-2 flex flex-col items-center text-slate-300 transition-all">
                <i class="fa-solid fa-users text-xl mb-1"></i>
                <span class="text-[9px] font-black uppercase">Staff</span>
            </button>
        </nav>

        <div id="profileModal" class="fixed inset-0 bg-white z-40 flex flex-col transform translate-y-full transition-transform duration-300 ease-out">
            <div class="bg-slate-50 px-6 py-6 flex items-center justify-between border-b border-slate-100 pt-safe" style="padding-top: env(safe-area-inset-top);">
                <button onclick="closeProfile()" class="h-10 w-10 flex items-center justify-center rounded-xl bg-white shadow-sm text-slate-800">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <span class="font-black text-slate-900">Personnel Record</span>
                <div class="w-10"></div>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div class="text-center mb-8">
                    <div class="h-24 w-24 mx-auto rounded-3xl bg-slate-100 text-slate-800 flex justify-center items-center font-black text-4xl mb-4 shadow-sm" id="modalIcon">?</div>
                    <h3 class="font-black text-2xl text-slate-900 flex justify-center items-center" id="modalName">
                        - 
                        <button id="btnEditProfile" class="ml-3 text-sm bg-blue-100 text-blue-600 w-8 h-8 rounded-full hidden"><i class="fa-solid fa-pen"></i></button>
                    </h3>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-indigo-600 rounded-3xl p-5 text-center text-white shadow-blue-200 shadow-lg">
                        <p class="text-[10px] opacity-70 mb-1 font-bold">WORK DAYS</p>
                        <p class="text-3xl font-black" id="modalDays">0</p>
                    </div>
                    <div class="bg-white rounded-3xl p-5 text-center border border-slate-100 shadow-sm">
                        <p class="text-[10px] text-rose-500 mb-1 font-bold uppercase">Lateness</p>
                        <p class="text-3xl font-black text-rose-600" id="modalLate">0</p>
                    </div>
                </div>
                <h4 class="font-black text-slate-800 mb-4 text-xs uppercase tracking-widest">Attendance Logs</h4>
                <div class="space-y-3" id="modalLogs"></div>
            </div>
        </div>

        <div id="imageViewerModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
            <div class="w-full h-[80vh] max-w-lg bg-white rounded-2xl overflow-hidden relative shadow-2xl flex flex-col">
                <div class="bg-slate-900 px-4 py-3 flex justify-between items-center">
                    <span class="text-white text-sm font-bold"><i class="fa-solid fa-image mr-2"></i>หลักฐานการลงเวลา</span>
                    <button onclick="closeImageViewer()" class="bg-rose-500 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-rose-600"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <iframe id="viewerIframe" src="" class="w-full flex-1 border-0 bg-slate-100"></iframe>
            </div>
        </div>

    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-3"></i>
        <p class="font-bold text-slate-800">กำลังอัปเดตข้อมูล...</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwSBHeswptojhNiHKeIsgo3cwaTEjOfBqPhJnY8GmGw_abhfPMk87FEA5dGm1j27gLm3A/exec";
        let allData = [];

        // ตั้งค่าวันที่ปัจจุบัน 
        const today = new Date();
        const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('dateFilter').value = localDate;

        // ฟังก์ชันครอบจักรวาล: แปลงเวลาได้ทุกรูปแบบ
        function formatDateTime(rawString) {
            if (!rawString || rawString === "undefined") return { dateStr: "", timeStr: "", isLate: false };
            
            let cleanStr = String(rawString).replace('T', ' ').replace('Z', '').trim();
            let parts = cleanStr.split(' ');
            
            let d = parts[0] || ""; 
            let t = parts[1] || "00:00:00"; 
            
            // 1. จัดการวันที่ให้อยู่ในฟอร์แมต YYYY-MM-DD
            if (d.includes('/')) {
                let dp = d.split('/');
                if (dp.length === 3) {
                    // ถ้าช่องสุดท้ายมี 4 ตัว ถือว่าเป็นปี (DD/MM/YYYY)
                    if(dp[2].length === 4) {
                        d = `${dp[2]}-${dp[1].padStart(2,'0')}-${dp[0].padStart(2,'0')}`;
                    } else if (dp[0].length === 4) {
                        d = `${dp[0]}-${dp[1].padStart(2,'0')}-${dp[2].padStart(2,'0')}`;
                    }
                }
            }

            // 2. จัดการเวลา ให้อยู่ในฟอร์แมต HH:mm:ss (24 ชั่วโมงเสมอ)
            let tParts = t.split(':');
            let h = parseInt(tParts[0] || 0, 10);
            let m = parseInt(tParts[1] || 0, 10);
            let s = parseInt(tParts[2] || 0, 10);

            // เช็กระบบ AM/PM ที่อาจติดมา
            if (parts.length > 2) {
                let ampm = parts[2].toUpperCase();
                if ((ampm === 'PM' || ampm === 'หลังเที่ยง') && h < 12) h += 12;
                if ((ampm === 'AM' || ampm === 'ก่อนเที่ยง') && h === 12) h = 0;
            }

            let finalTime = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

            // 3. เช็กสาย (08:40)
            let isLate = finalTime > "08:40:00";

            return { dateStr: d, timeStr: finalTime, isLate: isLate };
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // ระบบดึงข้อมูลแบบครอบจักรวาล (รองรับทั้งเวอร์ชันเก่าและเวอร์ชันใหม่ของ Google Sheets)
                allData = data.map(item => {
                    const keys = Object.keys(item);
                    // ถ้าหาคีย์ time ไม่เจอ ให้ไปดึงข้อมูลจากคอลัมน์แรกแทน
                    const rawTime = item.time || item[keys[0]];
                    const rawUserId = item.userId || item[keys[1]];
                    const rawName = item.name || item[keys[2]];
                    const rawImage = item.image || item[keys[3]];

                    const timeData = formatDateTime(rawTime);
                    
                    return {
                        userId: String(rawUserId).trim(),
                        dateStr: timeData.dateStr,
                        timeStr: timeData.timeStr,
                        isLate: timeData.isLate,
                        name: rawName || "พนักงานใหม่",
                        image: rawImage
                    };
                });
                
                renderDaily();
                renderStats();
                renderEmployeeList();
            } catch (error) {
                console.error(error);
            }
        }

        function renderDaily() {
            const selectedDate = document.getElementById('dateFilter').value;
            const dailyData = allData.filter(item => item.dateStr === selectedDate);
            const container = document.getElementById('dailyContainer');
            
            if (dailyData.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 text-xs py-10">ไม่มีบันทึกการเข้างานในวันนี้</p>';
                return;
            }

            container.innerHTML = dailyData.map(item => {
                const isUnknown = item.name.includes("พนักงานใหม่") || item.name.trim() === "";
                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="h-12 w-12 rounded-2xl ${item.isLate ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'} flex justify-center items-center font-bold text-xl shadow-sm">${isUnknown ? '?' : item.name.charAt(0)}</div>
                            <div>
                                <h3 class="font-bold text-slate-800 flex items-center">
                                    ${isUnknown ? `<span class="text-rose-500">ยังไม่ระบุชื่อ</span> <button onclick="editNamePrompt('${item.userId}')" class="ml-2 bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[10px]"><i class="fa-solid fa-pen mr-1"></i>ใส่ชื่อ</button>` : `คุณ${item.name}`}
                                </h3>
                                <p class="text-[11px] ${item.isLate ? 'text-rose-400 font-bold' : 'text-slate-400 font-medium'}">เข้างาน: ${item.timeStr}</p>
                            </div>
                        </div>
                        <span class="${item.isLate ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'} px-3 py-1 rounded-lg text-[10px] font-black uppercase border">
                            ${item.isLate ? 'Late' : 'On Time'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        async function editNamePrompt(userId) {
            const newName = prompt("กรุณาระบุชื่อของพนักงานท่านนี้:");
            if (newName && newName.trim() !== "") {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                document.getElementById('loadingOverlay').classList.add('flex');
                try {
                    const res = await fetch(`${API_URL}?action=update_name&userId=${encodeURIComponent(userId)}&newName=${encodeURIComponent(newName.trim())}`);
                    const data = await res.json();
                    if (data.status === "success") {
                        await fetchData(); 
                    }
                } catch(e) {
                    alert("เกิดข้อผิดพลาดในการบันทึกชื่อ");
                }
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('loadingOverlay').classList.remove('flex');
            }
        }

        function renderStats() {
            const users = [...new Set(allData.map(i => i.userId).filter(u => u))];
            const container = document.getElementById('statsContainer');
            let html = '';
            
            users.forEach(uid => {
                const logs = allData.filter(i => i.userId === uid);
                const lateLogs = logs.filter(i => i.isLate);
                const name = logs[0].name;
                
                if (lateLogs.length > 0) {
                    const lateDates = lateLogs.map(item => `<span class="bg-slate-50 text-slate-600 text-[10px] px-2 py-1 rounded-md border border-slate-100 font-medium shadow-sm">${item.dateStr}</span>`).join('');
                    html += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center space-x-3">
                                    <div class="h-10 w-10 rounded-xl bg-slate-100 flex items-center justify-center font-bold text-slate-600">${name.includes("พนักงานใหม่") ? '?' : name.charAt(0)}</div>
                                    <h3 class="font-bold text-slate-800">${name.includes("พนักงานใหม่") ? "พนักงานใหม่" : "คุณ"+name}</h3>
                                </div>
                                <div class="text-right text-rose-600 font-black text-xl">${lateLogs.length} <span class="text-[10px] text-slate-400 font-medium">ครั้ง</span></div>
                            </div>
                            <div class="space-y-2"><p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">วันที่มาสาย:</p><div class="flex flex-wrap gap-2">${lateDates}</div></div>
                        </div>`;
                }
            });
            container.innerHTML = html || '<div class="bg-emerald-50 p-6 rounded-3xl text-center border border-emerald-100"><p class="text-emerald-700 font-bold text-sm">เดือนนี้ยังไม่มีประวัติการสาย</p></div>';
        }

        function renderEmployeeList() {
            const users = [...new Set(allData.map(i => i.userId).filter(u => u))];
            const container = document.getElementById('usersContainer');
            
            container.innerHTML = users.map(uid => {
                const logs = allData.filter(i => i.userId === uid);
                const name = logs[0].name;
                const lateCount = logs.filter(i => i.isLate).length;
                const isUnknown = name.includes("พนักงานใหม่") || name.trim() === "";

                return `
                    <div onclick="openProfile('${uid}')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center active:scale-95 transition-transform cursor-pointer">
                        <div class="h-16 w-16 mx-auto rounded-2xl ${lateCount > 3 ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'} flex justify-center items-center font-bold text-2xl mb-3 shadow-sm">${isUnknown ? '?' : name.charAt(0)}</div>
                        <p class="font-bold text-slate-800 truncate px-2">${isUnknown ? 'ยังไม่ระบุชื่อ' : 'คุณ'+name}</p>
                        <p class="text-[10px] ${lateCount > 0 ? 'text-rose-400 font-bold' : 'text-slate-400'}">${isUnknown ? 'กดเพื่อใส่ชื่อ' : (lateCount > 0 ? 'สาย '+lateCount+' ครั้ง' : 'ไม่เคยสาย')}</p>
                    </div>`;
            }).join('');
        }

        function openProfile(uid) {
            const logs = allData.filter(i => i.userId === uid);
            const lateLogs = logs.filter(i => i.isLate);
            const name = logs[0].name;
            const isUnknown = name.includes("พนักงานใหม่") || name.trim() === "";

            document.getElementById('modalName').innerHTML = isUnknown ? `ไม่ระบุชื่อ <button onclick="editNamePrompt('${uid}'); closeProfile();" class="ml-2 text-sm bg-blue-100 text-blue-600 w-8 h-8 rounded-full"><i class="fa-solid fa-pen"></i></button>` : `คุณ${name} <button onclick="editNamePrompt('${uid}'); closeProfile();" class="ml-2 text-sm bg-slate-100 text-slate-400 hover:text-blue-600 w-8 h-8 rounded-full"><i class="fa-solid fa-pen"></i></button>`;
            document.getElementById('modalIcon').innerText = isUnknown ? "?" : name.charAt(0);
            document.getElementById('modalDays').innerText = logs.length;
            document.getElementById('modalLate').innerText = lateLogs.length;

            document.getElementById('modalLogs').innerHTML = logs.slice(0, 10).map(item => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div>
                        <span class="text-xs font-bold text-slate-600 block">${item.dateStr}</span>
                        ${item.image ? `<button onclick="openImageViewer('${item.image}')" class="text-[10px] text-blue-600 font-bold uppercase tracking-tight mt-1 hover:underline"><i class="fa-solid fa-image mr-1"></i>ดูรูปในแอป</button>` : ''}
                    </div>
                    <span class="text-xs font-black ${item.isLate ? 'text-rose-600' : 'text-slate-900'}">${item.timeStr}</span>
                </div>
            `).join('') || '<p class="text-center text-xs text-slate-400 py-4">ไม่มีประวัติการลงเวลา</p>';
            
            document.getElementById('profileModal').classList.remove('translate-y-full');
        }

        function closeProfile() { document.getElementById('profileModal').classList.add('translate-y-full'); }
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => { el.classList.remove('nav-active'); el.classList.add('text-slate-300'); });
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('nav-active');
            document.getElementById('nav-' + tabId).classList.remove('text-slate-300');
        }

        function openImageViewer(driveUrl) {
            let previewUrl = driveUrl;
            const match = driveUrl.match(/\/d\/(.+?)\//);
            if (match && match[1]) previewUrl = `https://drive.google.com/file/d/${match[1]}/preview`;
            else if (driveUrl.includes('?usp=')) previewUrl = driveUrl.replace('view?usp=drivesdk', 'preview').replace('view?usp=sharing', 'preview');
            
            document.getElementById('viewerIframe').src = previewUrl;
            const viewerModal = document.getElementById('imageViewerModal');
            viewerModal.classList.remove('hidden'); viewerModal.classList.add('flex');
        }

        function closeImageViewer() {
            const viewerModal = document.getElementById('imageViewerModal');
            viewerModal.classList.add('hidden'); viewerModal.classList.remove('flex');
            document.getElementById('viewerIframe').src = ""; 
        }

        document.getElementById('dateFilter').addEventListener('change', renderDaily);
        fetchData();
    </script>
</body>
</html>
